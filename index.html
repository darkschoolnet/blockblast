<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Block Blast Ultimate - Fixed Version</title>
    <style>
        * { box-sizing: border-box; touch-action: none; -webkit-user-select: none; }
        
        body { 
            background: #2b3a67; color: white; font-family: 'Arial Rounded MT Bold', sans-serif; 
            margin: 0; padding: 0; display: flex; flex-direction: column; 
            align-items: center; height: 100vh; overflow: hidden;
        }

        #top-ui { width: 100%; padding: 20px 25px 0 25px; display: flex; justify-content: space-between; align-items: center; }
        .highscore-box { color: #f9b31c; font-size: 24px; font-weight: bold; display: flex; align-items: center; gap: 8px; }
        
        #score-container { text-align: center; margin: 10px 0; position: relative; width: 100%; height: 80px; }
        
        /* NEU: Score Transition für den Pop-Effekt */
        #score { 
            font-size: 64px; font-weight: 900; position: relative; z-index: 2; 
            text-shadow: 0 4px 15px rgba(0,0,0,0.4); 
            transition: transform 0.15s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
        }
        
        #score-container::before {
            content: '❤'; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            font-size: 100px; color: #d633ff; filter: blur(25px); opacity: 0.4; z-index: 1;
        }

        /* NEU: Wackel-Animation (Screen Shake) für saftigeres Feedback */
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            20%, 60% { transform: translateX(-4px) rotate(-1.5deg); }
            40%, 80% { transform: translateX(4px) rotate(1.5deg); }
        }
        .shake { animation: shake 0.35s ease-in-out; }

        #board-wrapper {
            background: #1e284a; padding: 8px; border-radius: 12px;
            box-shadow: inset 0 0 30px rgba(0,0,0,0.7), 0 15px 35px rgba(0,0,0,0.4);
            transition: transform 0.1s;
        }
        #board { 
            display: grid; grid-template-columns: repeat(8, 1fr); gap: 2px; 
            width: 90vw; max-width: 380px; aspect-ratio: 1; 
        }

        .cell { background: #161d36; border-radius: 4px; width: 100%; height: 100%; }
        .cell.filled { 
            border: 2px solid rgba(0,0,0,0.15);
            box-shadow: inset 4px 4px 0px rgba(255,255,255,0.3), inset -4px -4px 0px rgba(0,0,0,0.2);
        }
        .cell.highlight { background: rgba(255, 255, 255, 0.3) !important; box-shadow: 0 0 15px #fff; }

        #tray { 
            display: flex; justify-content: space-around; align-items: center;
            width: 100%; max-width: 400px; height: 160px; margin-top: auto; margin-bottom: 20px;
        }
        
        .shape-container { 
            width: 110px; height: 110px; position: relative; 
            display: flex; align-items: center; justify-content: center;
            background: rgba(255,255,255,0.02);
            border-radius: 10px;
        }

        .shape { 
            display: grid; gap: 2px; position: absolute; pointer-events: auto; 
        }

        .shape-block { 
            width: 22px; height: 22px; border-radius: 4px; border: 1px solid rgba(0,0,0,0.1);
            box-shadow: inset 2px 2px 0px rgba(255,255,255,0.2), inset -2px -2px 0px rgba(0,0,0,0.15);
        }

        /* Leichte Anpassung: hellerers Aufleuchten beim Löschen */
        @keyframes shrink { 0% { transform: scale(1.1); filter: brightness(2.5); } 100% { transform: scale(0); opacity: 0; } }
        .clearing { animation: shrink 0.3s forwards; z-index: 100; }

        #game-over {
            position: fixed; inset: 0; background: rgba(0,0,0,0.9); display: none;
            flex-direction: column; align-items: center; justify-content: center; z-index: 9999;
        }
        #game-over h2 { font-size: 48px; color: #ef4444; }
        #game-over button { padding: 15px 40px; font-size: 20px; border-radius: 30px; border: none; background: #22c55e; color: white; cursor: pointer; }

        #feedback-label {
            position: absolute; top: 40%; left: 50%; transform: translate(-50%, -50%);
            font-size: 56px; font-weight: 900; opacity: 0; z-index: 500; text-shadow: 0 5px 15px rgba(0,0,0,0.6);
            color: #ffeb3b; -webkit-text-stroke: 2px #d633ff;
            pointer-events: none;
        }
        .animate-feedback { animation: feedAnim 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }
        @keyframes feedAnim { 
            0% { opacity: 0; transform: translate(-50%, 20px) scale(0.5); } 
            20% { opacity: 1; transform: translate(-50%, 0) scale(1.2); }
            80% { opacity: 1; transform: translate(-50%, -80px) scale(1); }
            100% { opacity: 0; transform: translate(-50%, -100px) scale(0.8); } 
        }

        .version { opacity: 0.1; font-size: 0.6em; padding-bottom: 5px; }
    </style>
</head>
<body>

    <div id="top-ui">
        <div class="highscore-box">👑 <span id="best-score">0</span></div>
        <div class="settings-icon">⚙</div>
    </div>

    <div id="score-container"><div id="score">0</div></div>
    
    <div id="board-wrapper"><div id="board"></div></div>

    <div id="feedback-label">GOOD!</div>

    <div id="tray">
        <div class="shape-container" id="slot-0"></div>
        <div class="shape-container" id="slot-1"></div>
        <div class="shape-container" id="slot-2"></div>
    </div>

    <div id="game-over">
        <h2>GAME OVER</h2>
        <button onclick="resetGame()">NEUSTART</button>
    </div>

    <div class="version">Beta V1.2 (Juiced)</div>

    <script>
        const boardEl = document.getElementById('board');
        const scoreEl = document.getElementById('score');
        const bestScoreEl = document.getElementById('best-score');
        const feedbackEl = document.getElementById('feedback-label');
        const boardWrapperEl = document.getElementById('board-wrapper');
        const slots = [document.getElementById('slot-0'), document.getElementById('slot-1'), document.getElementById('slot-2')];
        
        let grid = Array(8).fill().map(() => Array(8).fill(null));
        let score = 0;
        let bestScore = localStorage.getItem('bb_best') || 0;
        bestScoreEl.innerText = bestScore;

        const SHAPES = [
            { data: [[1,1],[1,1]], color: '#3b82f6' },
            { data: [[1,1,1],[0,0,1]], color: '#ffcc00' },
            { data: [[1,1,1,1]], color: '#ef4444' },
            { data: [[1,1,1],[0,1,0]], color: '#00c7be' },
            { data: [[1,1,1]], color: '#f97316' }
        ];

        function init() {
            boardEl.innerHTML = '';
            for(let i=0; i<64; i++) boardEl.appendChild(document.createElement('div')).className = 'cell';
            slots.forEach(spawn);
        }

        function spawn(slot) {
            const s = SHAPES[Math.floor(Math.random() * SHAPES.length)];
            const el = document.createElement('div');
            el.className = 'shape';
            el.style.gridTemplateColumns = `repeat(${s.data[0].length}, 24px)`;
            
            s.data.forEach(row => row.forEach(v => {
                const b = document.createElement('div');
                if(v) { b.className = 'shape-block'; b.style.backgroundColor = s.color; }
                el.appendChild(b);
            }));
            slot.appendChild(el);
            handleDrag(el, slot, s.data, s.color);
        }

        function handleDrag(el, slot, data, color) {
            el.addEventListener('touchstart', (e) => {
                const rect = boardEl.getBoundingClientRect();
                const size = rect.width / 8;
                
                el.style.gridTemplateColumns = `repeat(${data[0].length}, ${size}px)`;
                el.querySelectorAll('.shape-block').forEach(b => {
                    b.style.width = size + 'px';
                    b.style.height = size + 'px';
                });
                el.style.position = 'fixed';
                el.style.zIndex = '1000';

                const move = (t) => {
                    el.style.left = t.clientX - (data[0].length * size / 2) + 'px';
                    el.style.top = t.clientY - (data.length * size) - 50 + 'px';
                    
                    const r = el.getBoundingClientRect();
                    const gx = Math.round((r.left - rect.left) / size);
                    const gy = Math.round((r.top - rect.top) / size);
                    
                    Array.from(boardEl.children).forEach(c => c.classList.remove('highlight'));
                    if(canPlace(data, gy, gx)) {
                        for(let i=0; i<data.length; i++) {
                            for(let j=0; j<data[0].length; j++) {
                                if(data[i][j]) boardEl.children[(gy+i)*8 + (gx+j)].classList.add('highlight');
                            }
                        }
                    }
                };

                const up = () => {
                    const r = el.getBoundingClientRect();
                    const gx = Math.round((r.left - rect.left) / size);
                    const gy = Math.round((r.top - rect.top) / size);

                    if(canPlace(data, gy, gx)) {
                        for(let i=0; i<data.length; i++) {
                            for(let j=0; j<data[0].length; j++) {
                                if(data[i][j]) grid[gy+i][gx+j] = color;
                            }
                        }
                        slot.innerHTML = '';
                        score += 10;
                        
                        // FIX: Zeichne das Spielfeld SOFORT, bevor auf gelöschte Reihen geprüft wird.
                        render(); 
                        
                        check();
                        if(slots.every(s => s.innerHTML === '')) slots.forEach(spawn);
                    } else {
                        el.style = '';
                        el.style.gridTemplateColumns = `repeat(${data[0].length}, 24px)`;
                        el.querySelectorAll('.shape-block').forEach(b => {
                            b.style.width = '22px'; b.style.height = '22px';
                        });
                    }
                    Array.from(boardEl.children).forEach(c => c.classList.remove('highlight'));
                    window.removeEventListener('touchmove', moveLayer);
                    window.removeEventListener('touchend', up);
                };

                const moveLayer = (me) => move(me.touches[0]);
                window.addEventListener('touchmove', moveLayer, { passive: false });
                window.addEventListener('touchend', up);
            });
        }

        function canPlace(data, r, c) {
            if(r < 0 || c < 0 || r + data.length > 8 || c + data[0].length > 8) return false;
            for(let i=0; i<data.length; i++) 
                for(let j=0; j<data[0].length; j++) 
                    if(data[i][j] && grid[r+i][c+j]) return false;
            return true;
        }

        function triggerScorePop() {
            scoreEl.style.transform = "scale(1.4)";
            setTimeout(() => { scoreEl.style.transform = "scale(1)"; }, 150);
        }

        function check() {
            let rs = [], cs = [];
            for(let r=0; r<8; r++) if(grid[r].every(v => v !== null)) rs.push(r);
            for(let c=0; c<8; c++) {
                let f = true;
                for(let r=0; r<8; r++) if(!grid[r][c]) f = false;
                if(f) cs.push(c);
            }

            let totalCleared = rs.length + cs.length;

            if(totalCleared > 0) {
                // JUICE: Feedback Texte basierend auf der Combo
                const feedbackTexts = ["GOOD!", "GREAT!", "AWESOME!", "UNBELIEVABLE!"];
                feedbackEl.innerText = feedbackTexts[Math.min(totalCleared - 1, 3)];
                feedbackEl.classList.remove('animate-feedback');
                void feedbackEl.offsetWidth; // Erzwingt Reflow um Animation neu zu starten
                feedbackEl.classList.add('animate-feedback');

                // JUICE: Screen Shake aktivieren
                boardWrapperEl.classList.add('shake');
                setTimeout(() => boardWrapperEl.classList.remove('shake'), 350);

                rs.forEach(r => { for(let i=0; i<8; i++) { boardEl.children[r*8+i].classList.add('clearing'); grid[r][i] = null; }});
                cs.forEach(c => { for(let i=0; i<8; i++) { boardEl.children[i*8+c].classList.add('clearing'); grid[i][c] = null; }});
                
                // JUICE: Bonuspunkte für Combos
                score += totalCleared * 100 * totalCleared; 
                
                // Score poppen lassen
                triggerScorePop();
                scoreEl.innerText = score;

                setTimeout(render, 300);
            } else {
                triggerScorePop(); // Auch beim reinen Platzieren ein kleiner Pop
                render();
            }
        }

        function render() {
            scoreEl.innerText = score;
            if(score > bestScore) { bestScore = score; bestScoreEl.innerText = bestScore; localStorage.setItem('bb_best', bestScore); }
            Array.from(boardEl.children).forEach((c, i) => {
                const r = Math.floor(i/8), col = i%8;
                c.className = 'cell' + (grid[r][col] ? ' filled' : '');
                c.style.backgroundColor = grid[r][col] || '';
            });
        }

        function resetGame() {
            grid = Array(8).fill().map(() => Array(8).fill(null));
            score = 0;
            document.getElementById('game-over').style.display = 'none';
            init();
            render();
        }

        init();
    </script>
</body>
</html>
