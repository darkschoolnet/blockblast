<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Block Blast Ultimate - Fixed Version</title>
    <style>
        * { box-sizing: border-box; touch-action: none; -webkit-user-select: none; }
        
        body { 
            background: #2b3a67; color: white; font-family: 'Arial Rounded MT Bold', sans-serif; 
            margin: 0; padding: 0; display: flex; flex-direction: column; 
            align-items: center; height: 100vh; overflow: hidden;
        }

        #top-ui { width: 100%; padding: 20px 25px 0 25px; display: flex; justify-content: space-between; align-items: center; }
        .highscore-box { color: #f9b31c; font-size: 24px; font-weight: bold; display: flex; align-items: center; gap: 8px; }
        
        #score-container { text-align: center; margin: 10px 0; position: relative; width: 100%; height: 90px; }
        
        #score { 
            font-size: 72px; font-weight: 900; position: relative; z-index: 2; 
            text-shadow: 0 4px 15px rgba(0,0,0,0.5); 
            transition: transform 0.15s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
        }
        
        /* Das Herz leuchtet jetzt noch stärker und sitzt besser */
        #score-container::before {
            content: '❤'; position: absolute; top: 45%; left: 50%; transform: translate(-50%, -50%);
            font-size: 110px; color: #ff2a85; filter: drop-shadow(0 0 20px #ff2a85) blur(18px); 
            opacity: 0.55; z-index: 1;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            20%, 60% { transform: translateX(-5px) rotate(-2deg); }
            40%, 80% { transform: translateX(5px) rotate(2deg); }
        }
        .shake { animation: shake 0.4s ease-in-out; }

        #board-wrapper {
            background: #1e284a; padding: 8px; border-radius: 12px;
            box-shadow: inset 0 0 30px rgba(0,0,0,0.7), 0 15px 35px rgba(0,0,0,0.4);
            transition: transform 0.1s;
        }
        #board { 
            display: grid; grid-template-columns: repeat(8, 1fr); gap: 2px; 
            width: 90vw; max-width: 380px; aspect-ratio: 1; 
        }

        /* KANTIGERE BLÖCKE: border-radius reduziert */
        .cell { background: #161d36; border-radius: 2px; width: 100%; height: 100%; }
        .cell.filled { 
            border: 2px solid rgba(0,0,0,0.25);
            box-shadow: inset 4px 4px 0px rgba(255,255,255,0.25), inset -4px -4px 0px rgba(0,0,0,0.25);
        }
        .cell.highlight { background: rgba(255, 255, 255, 0.4) !important; box-shadow: 0 0 15px #fff; }

        #tray { 
            display: flex; justify-content: space-around; align-items: center;
            width: 100%; max-width: 400px; height: 160px; margin-top: auto; margin-bottom: 20px;
        }
        
        .shape-container { 
            width: 110px; height: 110px; position: relative; 
            display: flex; align-items: center; justify-content: center;
            background: rgba(255,255,255,0.02);
            border-radius: 10px;
        }

        .shape { display: grid; gap: 2px; position: absolute; pointer-events: auto; }

        /* KANTIGERE BLÖCKE IM TRAY */
        .shape-block { 
            width: 22px; height: 22px; border-radius: 2px; border: 1px solid rgba(0,0,0,0.2);
            box-shadow: inset 2px 2px 0px rgba(255,255,255,0.25), inset -2px -2px 0px rgba(0,0,0,0.2);
        }

        /* STÄRKERE LÖSCH-ANIMATION */
        @keyframes blast { 
            0% { transform: scale(1.2); filter: brightness(3); border-radius: 50%; } 
            50% { transform: scale(1.4); filter: brightness(1.5); opacity: 0.8; }
            100% { transform: scale(0); opacity: 0; } 
        }
        .clearing { animation: blast 0.35s cubic-bezier(0.25, 0.46, 0.45, 0.94) forwards; z-index: 100; }

        #game-over {
            position: fixed; inset: 0; background: rgba(0,0,0,0.9); display: none;
            flex-direction: column; align-items: center; justify-content: center; z-index: 9999;
        }
        #game-over h2 { font-size: 56px; color: #ef4444; margin-bottom: 20px; text-shadow: 0 4px 10px rgba(0,0,0,0.5); }
        #game-over button { 
            padding: 18px 45px; font-size: 22px; font-weight: bold; border-radius: 12px; border: none; 
            background: #22c55e; color: white; cursor: pointer;
            box-shadow: 0 6px 0 #16a34a, 0 15px 20px rgba(0,0,0,0.4);
            transition: transform 0.1s, box-shadow 0.1s;
        }
        #game-over button:active { transform: translateY(6px); box-shadow: 0 0 0 #16a34a, 0 5px 10px rgba(0,0,0,0.4); }

        #feedback-label {
            position: absolute; top: 38%; left: 50%; transform: translate(-50%, -50%);
            font-size: 64px; font-weight: 900; opacity: 0; z-index: 500; text-shadow: 0 8px 20px rgba(0,0,0,0.8);
            color: #ffeb3b; -webkit-text-stroke: 3px #d633ff; font-style: italic;
            pointer-events: none; white-space: nowrap;
        }
        .animate-feedback { animation: feedAnim 1s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }
        @keyframes feedAnim { 
            0% { opacity: 0; transform: translate(-50%, 30px) scale(0.3); } 
            15% { opacity: 1; transform: translate(-50%, 0) scale(1.3); }
            25% { transform: translate(-50%, 0) scale(1.1); }
            80% { opacity: 1; transform: translate(-50%, -90px) scale(1.1); filter: blur(0px); }
            100% { opacity: 0; transform: translate(-50%, -120px) scale(0.8); filter: blur(10px); } 
        }

        .version { opacity: 0.1; font-size: 0.6em; padding-bottom: 5px; }
    </style>
</head>
<body>

    <div id="top-ui">
        <div class="highscore-box">👑 <span id="best-score">0</span></div>
        <div class="settings-icon">⚙</div>
    </div>

    <div id="score-container"><div id="score">0</div></div>
    
    <div id="board-wrapper"><div id="board"></div></div>

    <div id="feedback-label">GOOD!</div>

    <div id="tray">
        <div class="shape-container" id="slot-0"></div>
        <div class="shape-container" id="slot-1"></div>
        <div class="shape-container" id="slot-2"></div>
    </div>

    <div id="game-over">
        <h2>GAME OVER</h2>
        <button onclick="resetGame()">NEUES SPIEL</button>
    </div>

    <div class="version">Beta V1.3 (Game Over & New Shapes)</div>

    <script>
        const boardEl = document.getElementById('board');
        const scoreEl = document.getElementById('score');
        const bestScoreEl = document.getElementById('best-score');
        const feedbackEl = document.getElementById('feedback-label');
        const boardWrapperEl = document.getElementById('board-wrapper');
        const gameOverEl = document.getElementById('game-over');
        const slots = [document.getElementById('slot-0'), document.getElementById('slot-1'), document.getElementById('slot-2')];
        
        let grid = Array(8).fill().map(() => Array(8).fill(null));
        let score = 0;
        let bestScore = localStorage.getItem('bb_best') || 0;
        bestScoreEl.innerText = bestScore;

        // ERWEITERTES SHAPE-ARRAY MIT NEUEN Z/S BLÖCKEN UND FAIREN FORMEN
        const SHAPES = [
            // Standard
            { data: [[1,1],[1,1]], color: '#facc15' }, // 2x2
            { data: [[1,1,1],[0,0,1]], color: '#fb923c' }, // L
            { data: [[0,0,1],[1,1,1]], color: '#fb923c' }, // L gespiegelt
            { data: [[1,1,1,1]], color: '#38bdf8' }, // 4er Linie
            { data: [[1],[1],[1],[1]], color: '#38bdf8' }, // 4er Linie vertikal
            { data: [[1,1,1],[0,1,0]], color: '#c084fc' }, // T
            { data: [[1,1,1]], color: '#4ade80' }, // 3er Linie
            { data: [[1],[1],[1]], color: '#4ade80' }, // 3er Linie vertikal
            
            // Neue S und Z Formen (Die "2x3 ausgefüllten" Blöcke)
            { data: [[1,1,0],[0,1,1]], color: '#f43f5e' }, // Z horizontal
            { data: [[0,1,1],[1,1,0]], color: '#f43f5e' }, // S horizontal
            { data: [[1,0],[1,1],[0,1]], color: '#f43f5e' }, // Z vertikal
            { data: [[0,1],[1,1],[1,0]], color: '#f43f5e' }, // S vertikal
            
            // Kleine / Cleane Formen für mehr Fairness
            { data: [[1]], color: '#e879f9' }, // 1x1 Dot
            { data: [[1,1]], color: '#a3e635' }, // 2er Linie
            { data: [[1],[1]], color: '#a3e635' }, // 2er Linie vertikal
            { data: [[1,1,1,1,1]], color: '#60a5fa' }, // 5er Linie
            { data: [[1],[1],[1],[1],[1]], color: '#60a5fa' } // 5er Linie vertikal
        ];

        function init() {
            boardEl.innerHTML = '';
            for(let i=0; i<64; i++) boardEl.appendChild(document.createElement('div')).className = 'cell';
            refillTray();
        }

        function refillTray() {
            // Fairness-Logik: Erzwinge mindestens einen kleineren Block pro Refill, um das Board "cleaner" zu halten.
            slots.forEach((slot, index) => {
                let pool = SHAPES;
                // Der letzte Slot kriegt mit höherer Wahrscheinlichkeit etwas Kleines
                if(index === 2 && Math.random() > 0.3) {
                    pool = SHAPES.filter(s => s.data.flat().filter(v=>v).length <= 3);
                }
                const s = pool[Math.floor(Math.random() * pool.length)];
                spawn(slot, s);
            });
            checkGameOver();
        }

        function spawn(slot, shapeObj) {
            const el = document.createElement('div');
            el.className = 'shape';
            el.shapeData = shapeObj.data; // Speichere Daten am Element für Game Over Check
            el.style.gridTemplateColumns = `repeat(${shapeObj.data[0].length}, 24px)`;
            
            shapeObj.data.forEach(row => row.forEach(v => {
                const b = document.createElement('div');
                if(v) { b.className = 'shape-block'; b.style.backgroundColor = shapeObj.color; }
                el.appendChild(b);
            }));
            slot.appendChild(el);
            handleDrag(el, slot, shapeObj.data, shapeObj.color);
        }

        function handleDrag(el, slot, data, color) {
            el.addEventListener('touchstart', (e) => {
                const rect = boardEl.getBoundingClientRect();
                const size = rect.width / 8;
                
                el.style.gridTemplateColumns = `repeat(${data[0].length}, ${size}px)`;
                el.querySelectorAll('.shape-block').forEach(b => {
                    b.style.width = size + 'px';
                    b.style.height = size + 'px';
                });
                el.style.position = 'fixed';
                el.style.zIndex = '1000';

                const move = (t) => {
                    el.style.left = t.clientX - (data[0].length * size / 2) + 'px';
                    el.style.top = t.clientY - (data.length * size) - 60 + 'px'; // Leicht weiter oben greifen
                    
                    const r = el.getBoundingClientRect();
                    const gx = Math.round((r.left - rect.left) / size);
                    const gy = Math.round((r.top - rect.top) / size);
                    
                    Array.from(boardEl.children).forEach(c => c.classList.remove('highlight'));
                    if(canPlace(data, gy, gx)) {
                        for(let i=0; i<data.length; i++) {
                            for(let j=0; j<data[0].length; j++) {
                                if(data[i][j]) boardEl.children[(gy+i)*8 + (gx+j)].classList.add('highlight');
                            }
                        }
                    }
                };

                const up = () => {
                    const r = el.getBoundingClientRect();
                    const gx = Math.round((r.left - rect.left) / size);
                    const gy = Math.round((r.top - rect.top) / size);

                    if(canPlace(data, gy, gx)) {
                        for(let i=0; i<data.length; i++) {
                            for(let j=0; j<data[0].length; j++) {
                                if(data[i][j]) grid[gy+i][gx+j] = color;
                            }
                        }
                        slot.innerHTML = '';
                        score += data.flat().filter(v=>v).length * 2; // Punkte basierend auf Blockgröße
                        
                        render(); 
                        check();
                        
                        // Wenn alle Slots leer sind, fülle Tray neu. Sonst prüfe Game Over.
                        if(slots.every(s => s.innerHTML === '')) {
                            refillTray();
                        } else {
                            checkGameOver();
                        }
                        
                    } else {
                        el.style = '';
                        el.style.gridTemplateColumns = `repeat(${data[0].length}, 24px)`;
                        el.querySelectorAll('.shape-block').forEach(b => {
                            b.style.width = '22px'; b.style.height = '22px';
                        });
                    }
                    Array.from(boardEl.children).forEach(c => c.classList.remove('highlight'));
                    window.removeEventListener('touchmove', moveLayer);
                    window.removeEventListener('touchend', up);
                };

                const moveLayer = (me) => move(me.touches[0]);
                window.addEventListener('touchmove', moveLayer, { passive: false });
                window.addEventListener('touchend', up);
            });
        }

        function canPlace(data, r, c) {
            if(r < 0 || c < 0 || r + data.length > 8 || c + data[0].length > 8) return false;
            for(let i=0; i<data.length; i++) 
                for(let j=0; j<data[0].length; j++) 
                    if(data[i][j] && grid[r+i][c+j]) return false;
            return true;
        }

        // NEU: GAME OVER LOGIK
        function checkGameOver() {
            let possibleMoveFound = false;
            
            slots.forEach(slot => {
                if(slot.children.length > 0) {
                    let data = slot.children[0].shapeData;
                    // Prüfe jedes Feld auf dem Spielfeld
                    for(let r = 0; r < 8; r++) {
                        for(let c = 0; c < 8; c++) {
                            if(canPlace(data, r, c)) {
                                possibleMoveFound = true;
                            }
                        }
                    }
                }
            });

            if(!possibleMoveFound) {
                gameOverEl.style.display = 'flex';
            }
        }

        function triggerScorePop() {
            scoreEl.style.transform = "scale(1.3)";
            setTimeout(() => { scoreEl.style.transform = "scale(1)"; }, 150);
        }

        function check() {
            let rs = [], cs = [];
            for(let r=0; r<8; r++) if(grid[r].every(v => v !== null)) rs.push(r);
            for(let c=0; c<8; c++) {
                let f = true;
                for(let r=0; r<8; r++) if(!grid[r][c]) f = false;
                if(f) cs.push(c);
            }

            let totalCleared = rs.length + cs.length;

            if(totalCleared > 0) {
                // VERBESSERTE WÖRTER FÜR COMBOS
                const feedbackTexts = ["NICE!", "GREAT!", "AWESOME!", "EXCELLENT!", "UNBELIEVABLE!", "BLOCK BLAST!"];
                feedbackEl.innerText = feedbackTexts[Math.min(totalCleared - 1, 5)];
                feedbackEl.classList.remove('animate-feedback');
                void feedbackEl.offsetWidth; 
                feedbackEl.classList.add('animate-feedback');

                boardWrapperEl.classList.add('shake');
                setTimeout(() => boardWrapperEl.classList.remove('shake'), 400);

                rs.forEach(r => { for(let i=0; i<8; i++) { boardEl.children[r*8+i].classList.add('clearing'); grid[r][i] = null; }});
                cs.forEach(c => { for(let i=0; i<8; i++) { boardEl.children[i*8+c].classList.add('clearing'); grid[i][c] = null; }});
                
                // Punkteberechnung für saftigere Combos
                score += (totalCleared * 100) + (totalCleared > 1 ? totalCleared * 50 : 0); 
                
                triggerScorePop();
                scoreEl.innerText = score;

                setTimeout(() => {
                    render();
                    checkGameOver(); // Nach dem Löschen prüfen, ob man weiterspielen kann
                }, 350);
            } else {
                triggerScorePop();
                render();
            }
        }

        function render() {
            scoreEl.innerText = score;
            if(score > bestScore) { bestScore = score; bestScoreEl.innerText = bestScore; localStorage.setItem('bb_best', bestScore); }
            Array.from(boardEl.children).forEach((c, i) => {
                const r = Math.floor(i/8), col = i%8;
                c.className = 'cell' + (grid[r][col] ? ' filled' : '');
                c.style.backgroundColor = grid[r][col] || '';
            });
        }

        function resetGame() {
            grid = Array(8).fill().map(() => Array(8).fill(null));
            score = 0;
            gameOverEl.style.display = 'none';
            init();
            render();
        }

        init();
    </script>
</body>
</html>
