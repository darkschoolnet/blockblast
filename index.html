<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Block Blast Ultimate - Intelligence Update</title>
    <style>
        * { box-sizing: border-box; touch-action: none; -webkit-user-select: none; }
        body { 
            background: #1a2238; color: white; font-family: 'Arial Rounded MT Bold', sans-serif; 
            margin: 0; padding: 0; display: flex; flex-direction: column; 
            align-items: center; height: 100vh; overflow: hidden;
        }
        #top-ui { width: 100%; padding: 20px 25px 0 25px; display: flex; justify-content: space-between; align-items: center; }
        .highscore-box { color: #f9b31c; font-size: 24px; font-weight: bold; display: flex; align-items: center; gap: 8px; }
        #score-container { text-align: center; margin: 10px 0; position: relative; width: 100%; height: 90px; }
        #score { font-size: 72px; font-weight: 900; position: relative; z-index: 2; text-shadow: 0 4px 15px rgba(0,0,0,0.5); transition: transform 0.15s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        #score-container::before { content: '❤'; position: absolute; top: 45%; left: 50%; transform: translate(-50%, -50%); font-size: 110px; color: #ff2a85; filter: drop-shadow(0 0 20px #ff2a85) blur(18px); opacity: 0.4; z-index: 1; }
        @keyframes shake { 0%, 100% { transform: translateX(0); } 20%, 60% { transform: translateX(-5px) rotate(-1deg); } 40%, 80% { transform: translateX(5px) rotate(1deg); } }
        .shake { animation: shake 0.4s ease-in-out; }
        #board-wrapper { background: #0f172a; padding: 8px; border-radius: 8px; box-shadow: inset 0 0 30px rgba(0,0,0,0.8), 0 15px 35px rgba(0,0,0,0.5); }
        #board { display: grid; grid-template-columns: repeat(8, 1fr); gap: 2px; width: 90vw; max-width: 380px; aspect-ratio: 1; }
        .cell { background: #1e293b; border-radius: 2px; width: 100%; height: 100%; transition: background 0.2s; }
        .cell.filled { border: 2px solid rgba(0,0,0,0.3); box-shadow: inset 3px 3px 0px rgba(255,255,255,0.2), inset -3px -3px 0px rgba(0,0,0,0.3); }
        .cell.highlight { background: rgba(255, 255, 255, 0.4) !important; box-shadow: 0 0 15px #fff; }
        #tray { display: flex; justify-content: space-around; align-items: center; width: 100%; max-width: 400px; height: 150px; margin-top: auto; margin-bottom: 20px; }
        .shape-container { width: 110px; height: 110px; position: relative; display: flex; align-items: center; justify-content: center; background: rgba(255,255,255,0.03); border-radius: 12px; }
        .shape { display: grid; gap: 2px; position: absolute; pointer-events: auto; }
        .shape-block { width: 20px; height: 20px; border-radius: 2px; box-shadow: inset 2px 2px 0px rgba(255,255,255,0.2), inset -2px -2px 0px rgba(0,0,0,0.2); }
        @keyframes blast { 0% { transform: scale(1); filter: brightness(3); } 100% { transform: scale(0); opacity: 0; } }
        .clearing { animation: blast 0.3s forwards; z-index: 100; }
        #game-over { position: fixed; inset: 0; background: rgba(0,0,0,0.95); display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 9999; }
        #game-over h2 { font-size: 48px; color: #ef4444; margin-bottom: 10px; }
        #game-over button { padding: 15px 40px; font-size: 20px; border-radius: 8px; border: none; background: #22c55e; color: white; font-weight: bold; }
        #feedback-label { position: absolute; top: 40%; left: 50%; transform: translate(-50%, -50%); font-size: 50px; font-weight: 900; opacity: 0; z-index: 500; color: #ffeb3b; -webkit-text-stroke: 2px #9333ea; pointer-events: none; }
        .animate-feedback { animation: feedAnim 0.8s ease-out forwards; }
        @keyframes feedAnim { 0% { opacity:0; transform:translate(-50%, 20px) scale(0.5); } 20% { opacity:1; transform:translate(-50%, 0) scale(1.2); } 100% { opacity:0; transform:translate(-50%, -100px) scale(1); } }
    </style>
</head>
<body>
    <div id="top-ui"><div class="highscore-box">👑 <span id="best-score">0</span></div></div>
    <div id="score-container"><div id="score">0</div></div>
    <div id="board-wrapper"><div id="board"></div></div>
    <div id="feedback-label">COMBO!</div>
    <div id="tray">
        <div class="shape-container" id="slot-0"></div>
        <div class="shape-container" id="slot-1"></div>
        <div class="shape-container" id="slot-2"></div>
    </div>
    <div id="game-over"><h2>GAME OVER</h2><button onclick="resetGame()">NEUES SPIEL</button></div>

    <script>
        const boardEl = document.getElementById('board');
        const scoreEl = document.getElementById('score');
        const bestScoreEl = document.getElementById('best-score');
        const feedbackEl = document.getElementById('feedback-label');
        const boardWrapperEl = document.getElementById('board-wrapper');
        const slots = [document.getElementById('slot-0'), document.getElementById('slot-1'), document.getElementById('slot-2')];
        
        let grid = Array(8).fill().map(() => Array(8).fill(null));
        let score = 0;
        let bestScore = localStorage.getItem('bb_best_v2') || 0;
        bestScoreEl.innerText = bestScore;

        const ALL_SHAPES = [
            // 1x1 Dot
            { data: [[1]], color: '#e879f9', type: 'tiny' },
            // Linien & Rotationen
            { data: [[1,1]], color: '#a3e635', type: 'small' },
            { data: [[1],[1]], color: '#a3e635', type: 'small' },
            { data: [[1,1,1]], color: '#4ade80', type: 'med' },
            { data: [[1],[1],[1]], color: '#4ade80', type: 'med' },
            { data: [[1,1,1,1]], color: '#38bdf8', type: 'large' },
            { data: [[1],[1],[1],[1]], color: '#38bdf8', type: 'large' },
            // L-Shapes (alle Rotationen)
            { data: [[1,1],[1,0]], color: '#fb923c', type: 'med' },
            { data: [[1,1],[0,1]], color: '#fb923c', type: 'med' },
            { data: [[1,0],[1,1]], color: '#fb923c', type: 'med' },
            { data: [[0,1],[1,1]], color: '#fb923c', type: 'med' },
            // Große L-Shapes (3x3)
            { data: [[1,0,0],[1,0,0],[1,1,1]], color: '#f87171', type: 'big_l' },
            { data: [[1,1,1],[1,0,0],[1,0,0]], color: '#f87171', type: 'big_l' },
            { data: [[1,1,1],[0,0,1],[0,0,1]], color: '#f87171', type: 'big_l' },
            { data: [[0,0,1],[0,0,1],[1,1,1]], color: '#f87171', type: 'big_l' },
            // Quadrate
            { data: [[1,1],[1,1]], color: '#facc15', type: 'square' },
            { data: [[1,1,1],[1,1,1],[1,1,1]], color: '#fbbf24', type: 'massive' },
            // T-Shapes
            { data: [[1,1,1],[0,1,0]], color: '#c084fc', type: 'med' },
            { data: [[0,1,0],[1,1,1]], color: '#c084fc', type: 'med' },
            { data: [[1,0],[1,1],[1,0]], color: '#c084fc', type: 'med' },
            { data: [[0,1],[1,1],[0,1]], color: '#c084fc', type: 'med' },
            // Z & S Shapes
            { data: [[1,1,0],[0,1,1]], color: '#f43f5e', type: 'med' },
            { data: [[0,1,1],[1,1,0]], color: '#f43f5e', type: 'med' },
            { data: [[1,0],[1,1],[0,1]], color: '#f43f5e', type: 'med' },
            { data: [[0,1],[1,1],[1,0]], color: '#f43f5e', type: 'med' }
        ];

        function init() {
            boardEl.innerHTML = '';
            for(let i=0; i<64; i++) boardEl.appendChild(document.createElement('div')).className = 'cell';
            refillTray();
        }

        // INTELLIGENTE GENERIERUNG
        function getSmartShape() {
            // 1. Analysiere das Feld
            let rowFill = Array(8).fill(0);
            let colFill = Array(8).fill(0);
            for(let r=0; r<8; r++) {
                for(let c=0; c<8; c++) {
                    if(grid[r][c]) { rowFill[r]++; colFill[c]++; }
                }
            }

            // 2. Prüfe auf fast volle Reihen (Kombos provozieren)
            const needsFinisher = rowFill.some(v => v >= 6) || colFill.some(v => v >= 6);
            
            // 3. Auswahlstrategie
            if (score < 500) {
                // Anfangsphase: Mehr Quadrate und L-Blöcke
                const easyPool = ALL_SHAPES.filter(s => ['square', 'med', 'small'].includes(s.type));
                return easyPool[Math.floor(Math.random() * easyPool.length)];
            }
            
            if (needsFinisher && Math.random() > 0.4) {
                // Hilf dem Spieler: Gib einen Punkt oder eine kurze Linie
                const finisherPool = ALL_SHAPES.filter(s => ['tiny', 'small'].includes(s.type));
                return finisherPool[Math.floor(Math.random() * finisherPool.length)];
            }

            // Standard Zufall
            return ALL_SHAPES[Math.floor(Math.random() * ALL_SHAPES.length)];
        }

        function refillTray() {
            slots.forEach(slot => spawn(slot, getSmartShape()));
            checkGameOver();
        }

        function spawn(slot, shapeObj) {
            const el = document.createElement('div');
            el.className = 'shape';
            el.shapeData = shapeObj.data;
            el.style.gridTemplateColumns = `repeat(${shapeObj.data[0].length}, 22px)`;
            shapeObj.data.forEach(row => row.forEach(v => {
                const b = document.createElement('div');
                if(v) { b.className = 'shape-block'; b.style.backgroundColor = shapeObj.color; }
                el.appendChild(b);
            }));
            slot.appendChild(el);
            handleDrag(el, slot, shapeObj.data, shapeObj.color);
        }

        function handleDrag(el, slot, data, color) {
            el.addEventListener('touchstart', (e) => {
                const rect = boardEl.getBoundingClientRect();
                const size = rect.width / 8;
                el.style.gridTemplateColumns = `repeat(${data[0].length}, ${size}px)`;
                el.querySelectorAll('.shape-block').forEach(b => { b.style.width = size+'px'; b.style.height = size+'px'; });
                el.style.position = 'fixed';
                el.style.zIndex = '1000';

                const move = (t) => {
                    el.style.left = t.clientX - (data[0].length * size / 2) + 'px';
                    el.style.top = t.clientY - (data.length * size) - 40 + 'px';
                    const r = el.getBoundingClientRect();
                    const gx = Math.round((r.left - rect.left) / size);
                    const gy = Math.round((r.top - rect.top) / size);
                    Array.from(boardEl.children).forEach(c => c.classList.remove('highlight'));
                    if(canPlace(data, gy, gx)) {
                        for(let i=0; i<data.length; i++) for(let j=0; j<data[0].length; j++)
                            if(data[i][j]) boardEl.children[(gy+i)*8 + (gx+j)].classList.add('highlight');
                    }
                };

                const up = () => {
                    const r = el.getBoundingClientRect();
                    const gx = Math.round((r.left - rect.left) / size);
                    const gy = Math.round((r.top - rect.top) / size);
                    if(canPlace(data, gy, gx)) {
                        for(let i=0; i<data.length; i++) for(let j=0; j<data[0].length; j++)
                            if(data[i][j]) grid[gy+i][gx+j] = color;
                        slot.innerHTML = '';
                        score += data.flat().filter(v=>v).length;
                        render(); check();
                        if(slots.every(s => s.innerHTML === '')) refillTray();
                        else checkGameOver();
                    } else {
                        el.style = '';
                        el.style.gridTemplateColumns = `repeat(${data[0].length}, 22px)`;
                        el.querySelectorAll('.shape-block').forEach(b => { b.style.width='20px'; b.style.height='20px'; });
                    }
                    Array.from(boardEl.children).forEach(c => c.classList.remove('highlight'));
                    window.removeEventListener('touchmove', moveLayer);
                    window.removeEventListener('touchend', up);
                };
                const moveLayer = (me) => move(me.touches[0]);
                window.addEventListener('touchmove', moveLayer, { passive: false });
                window.addEventListener('touchend', up);
            });
        }

        function canPlace(data, r, c) {
            if(r < 0 || c < 0 || r + data.length > 8 || c + data[0].length > 8) return false;
            for(let i=0; i<data.length; i++) for(let j=0; j<data[0].length; j++)
                if(data[i][j] && grid[r+i][c+j]) return false;
            return true;
        }

        function check() {
            let rs = [], cs = [];
            for(let r=0; r<8; r++) if(grid[r].every(v => v !== null)) rs.push(r);
            for(let c=0; c<8; c++) {
                let f = true;
                for(let r=0; r<8; r++) if(!grid[r][c]) f = false;
                if(f) cs.push(c);
            }
            if(rs.length + cs.length > 0) {
                const words = ["GOOD!", "FANTASTIC!", "COMBO!", "UNBELIEVABLE!", "BLOCK BLAST!"];
                feedbackEl.innerText = words[Math.min(rs.length + cs.length - 1, 4)];
                feedbackEl.classList.remove('animate-feedback');
                void feedbackEl.offsetWidth;
                feedbackEl.classList.add('animate-feedback');
                boardWrapperEl.classList.add('shake');
                setTimeout(() => boardWrapperEl.classList.remove('shake'), 400);

                rs.forEach(r => { for(let i=0; i<8; i++) { boardEl.children[r*8+i].classList.add('clearing'); grid[r][i] = null; }});
                cs.forEach(c => { for(let i=0; i<8; i++) { boardEl.children[i*8+c].classList.add('clearing'); grid[i][c] = null; }});
                score += (rs.length + cs.length) * 100;
                scoreEl.innerText = score;
                setTimeout(render, 300);
            }
        }

        function render() {
            scoreEl.innerText = score;
            if(score > bestScore) { bestScore = score; bestScoreEl.innerText = bestScore; localStorage.setItem('bb_best_v2', bestScore); }
            Array.from(boardEl.children).forEach((c, i) => {
                const r = Math.floor(i/8), col = i%8;
                c.className = 'cell' + (grid[r][col] ? ' filled' : '');
                c.style.backgroundColor = grid[r][col] || '';
            });
        }

        function checkGameOver() {
            let possible = false;
            slots.forEach(slot => {
                if(slot.children.length > 0) {
                    let data = slot.children[0].shapeData;
                    for(let r=0; r<8; r++) for(let c=0; c<8; c++) if(canPlace(data, r, c)) possible = true;
                }
            });
            if(!possible) document.getElementById('game-over').style.display = 'flex';
        }

        function resetGame() {
            grid = Array(8).fill().map(() => Array(8).fill(null));
            score = 0;
            document.getElementById('game-over').style.display = 'none';
            init(); render();
        }

        init();
    </script>
</body>
</html>
